<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
    {% block head %}
        <title>{{ title }}</title>
        {% block head_meta %}
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scaled=1.0">
            <meta name="author" content="manhdoi">
            <meta name="theme-color" content="#000000">
            <meta name="applications" content="{{ json_dumps(inject_applications(current_user.id)) }}">
            <meta name="menu" content="{{ json_dumps(inject_menu()) }}">
            <meta name="current_user" content={{ current_user.user_name }}>
        {% endblock %}

        {% block head_css %}
        {% endblock %}

        {% block head_js %}
        {% endblock %}
    {% endblock %}
</head>

<body style="background: #dadada; height: 100%; margin: 0">
<main class="container-fluid flex-nowrap d-flex flex-column"
      style="width: 100%; height: 100%; padding: 0; margin: 0; background: white">
    <div id="header_navbar"></div>
    <div class="container-fluid flex-fill p-0" style="margin: 0; padding: 0; overflow: hidden">
        <div class="d-flex" style="height: 93vh; overflow: hidden; padding-left: 0;">

            <div id="sidebar_menu" class="d-flex" style="background: #ffffff; min-height: 93vh;">
            </div>

            <div class="container-fluid flex-fill d-flex flex-nowrap flex-column"
                 style="height: 93vh; overflow-y: auto; background: #fff; padding-left: 50px; padding-right: 50px;">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>
</main>


</body>

<script src="{{ url_for('index.static', filename='dist/index.js') }}"></script>

</html>
